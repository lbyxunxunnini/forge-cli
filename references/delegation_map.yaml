# Flutter Forge 委托映射
# 指向 flutter-skills/ 本地副本
# 更新日期：2026-05-14

delegation_map:
  requirement_phase:
    owned_by: "flutter-forge"
    delegate_to: []
    rule: "需求理解属于项目与业务语义层，不委托子技能。"

  ui_parsing_phase:
    owned_by: "flutter-forge"
    delegate_to:
      - skill: "flutter-build-responsive-layout"
        path: "flutter-skills/flutter-build-responsive-layout/SKILL.md"
        when:
          - "需要做多端响应式布局"
          - "页面结构强依赖约束系统"
      - skill: "flutter-fix-layout-issues"
        path: "flutter-skills/flutter-fix-layout-issues/SKILL.md"
        when:
          - "遇到布局溢出或约束错误"
    rule: "Flutter Forge 负责页面结构拆分；布局、约束和常见溢出类子问题优先参考本地 Flutter skill。"

  implementation_design_phase:
    owned_by: "flutter-forge"
    delegate_to:
      - skill: "flutter-apply-architecture-best-practices"
        path: "flutter-skills/flutter-apply-architecture-best-practices/SKILL.md"
        when:
          - "需要确定分层架构"
          - "需要做架构重构"
      - skill: "flutter-setup-declarative-routing"
        path: "flutter-skills/flutter-setup-declarative-routing/SKILL.md"
        when:
          - "需要新增或调整路由体系"
      - skill: "flutter-implement-json-serialization"
        path: "flutter-skills/flutter-implement-json-serialization/SKILL.md"
        when:
          - "需要新增模型序列化"
      - skill: "flutter-use-http-package"
        path: "flutter-skills/flutter-use-http-package/SKILL.md"
        when:
          - "需要设计 HTTP 接入方式"
      - skill: "flutter-setup-localization"
        path: "flutter-skills/flutter-setup-localization/SKILL.md"
        when:
          - "页面涉及多语言接入"
    rule: "子技能提供通用蓝图；Flutter Forge 负责项目内落层、命名、复用和收口。"

  development_phase:
    owned_by: "flutter-forge"
    delegate_to:
      - skill: "flutter-add-widget-test"
        path: "flutter-skills/flutter-add-widget-test/SKILL.md"
        when:
          - "新增可复用组件"
          - "新增明显交互行为"
      - skill: "flutter-add-widget-preview"
        path: "flutter-skills/flutter-add-widget-preview/SKILL.md"
        when:
          - "需要做多状态预览"
      - skill: "flutter-add-integration-test"
        path: "flutter-skills/flutter-add-integration-test/SKILL.md"
        when:
          - "涉及关键用户流程"
    rule: "页面开发阶段允许参考本地 Flutter skill 处理通用代码形态，但仍由 Flutter Forge 统一输出结构。"

  quality_phase:
    owned_by: "flutter-forge"
    delegate_to: []
    rule: "质量判断由 Flutter Forge 主导，测试实现可参考子技能。"
